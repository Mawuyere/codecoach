<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyCoach — Learn Python with AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="../../js/env.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../../js/auth.js"></script>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #1f2937;
  --border: #30363d; --text: #e6edf3; --muted: #7d8590;
  --accent: #f7c948; --accent2: #3fb68b; --accent3: #58a6ff;
  --danger: #f85149; --py-blue: #306998; --py-yellow: #FFD43B;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; }

/* ── APP LAYOUT ── */
.app {
  display:flex;
  height:100vh;
  height:100dvh;
  min-height:100vh;
  position:relative;
}

/* ── SIDEBAR ── */
.sidebar {
  width:280px; min-width:280px; background:var(--surface);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
  position:fixed; top:0; left:0; bottom:0;
  z-index:220;
  transform:translateX(-105%);
  transition:transform 0.2s ease;
  box-shadow:16px 0 34px rgba(0,0,0,0.45);
}
.app.sidebar-open .sidebar {
  transform:translateX(0);
}
.sidebar-backdrop {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.5);
  z-index:210;
}
.app.sidebar-open .sidebar-backdrop {
  display:block;
}
.logo {
  padding:1rem 1.25rem; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:0.6rem; flex-shrink:0;
}
.logo-icon {
  width:28px; height:28px; border-radius:6px;
  background:linear-gradient(135deg,var(--py-blue),var(--py-yellow));
  display:flex; align-items:center; justify-content:center;
  font-size:0.75rem; font-weight:800; color:#fff; font-family:'Syne',sans-serif;
}
.logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:0.95rem; }
.logo-text span { color:var(--py-yellow); }

.user-pill {
  padding:0.6rem 1.25rem; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:0.5rem; flex-shrink:0;
}
.user-avatar {
  width:26px; height:26px; border-radius:50%;
  background:linear-gradient(135deg,var(--py-blue),var(--accent3));
  display:flex; align-items:center; justify-content:center;
  font-size:0.65rem; font-weight:700; color:#fff; font-family:'Syne',sans-serif;
}
.user-info { flex:1; min-width:0; }
.user-name-text { font-size:0.7rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-level-text { font-size:0.58rem; color:var(--muted); }

.progress-wrap {
  padding:0.75rem 1.25rem; border-bottom:1px solid var(--border); flex-shrink:0;
}
.progress-label {
  display:flex; justify-content:space-between; align-items:center;
  font-size:0.6rem; color:var(--muted); text-transform:uppercase;
  letter-spacing:0.1em; margin-bottom:0.4rem;
}
.progress-track {
  height:3px; background:var(--border); border-radius:99px; overflow:hidden;
}
.progress-fill {
  height:100%; width:0%; border-radius:99px;
  background:linear-gradient(90deg,var(--py-blue),var(--py-yellow));
  transition:width 0.5s ease;
}

.module-list { flex:1; overflow-y:auto; padding:0.5rem 0; }
.module-list::-webkit-scrollbar { width:3px; }
.module-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }

.section-header {
  display:flex; align-items:center; gap:0.4rem;
  padding:0.7rem 1.25rem 0.3rem;
  font-size:0.58rem; letter-spacing:0.15em; color:var(--muted);
}
.section-dot { width:6px; height:6px; border-radius:50%; display:inline-block; }

.module-item {
  display:flex; align-items:center; gap:0.5rem;
  padding:0.55rem 1.25rem; cursor:pointer;
  transition:background 0.15s; border-left:2px solid transparent;
}
.module-item:hover { background:rgba(255,255,255,0.03); }
.module-item.active {
  background:rgba(247,201,72,0.08); border-left-color:var(--accent);
}
.module-item.active .module-name-text { color:var(--text); }
.module-num-text { font-size:0.6rem; color:var(--muted); min-width:16px; }
.module-name-text { font-size:0.68rem; color:var(--muted); flex:1; }
.module-item.active .module-num-text { color:var(--accent); }

.status-dot {
  width:7px; height:7px; border-radius:50%; flex-shrink:0;
}
.dot-empty { background:var(--border); }
.dot-active { background:var(--accent); box-shadow:0 0 6px var(--accent); }
.dot-done { background:var(--accent2); }

.sidebar-footer {
  padding:0.75rem 1.25rem; border-top:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center; flex-shrink:0;
}
.xp-badge-sb, .streak-badge-sb {
  font-size:0.65rem; color:var(--muted);
  background:var(--surface2); border:1px solid var(--border);
  padding:0.2rem 0.5rem; border-radius:99px;
}

/* ── MAIN PANEL ── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; width:100%; }

.top-bar {
  height:52px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 1.5rem; flex-shrink:0; background:var(--surface);
}
.top-bar-left h2 {
  font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700;
}
.top-bar-left p {
  font-size:0.6rem; color:var(--muted); margin-top:1px;
}
.top-bar-right { display:flex; gap:0.5rem; align-items:center; }
.sidebar-toggle-btn {
  padding:0.35rem 0.65rem; border-radius:8px;
  border:1px solid var(--border); background:var(--surface2);
  color:var(--text); font-family:'JetBrains Mono',monospace;
  font-size:0.65rem; cursor:pointer; transition:all 0.15s;
}
.sidebar-toggle-btn:hover { border-color:var(--accent); color:var(--accent); }
.coach-toggle-btn {
  padding:0.35rem 0.75rem; border-radius:8px;
  border:1px solid var(--border); background:var(--surface2);
  color:var(--text); font-family:'JetBrains Mono',monospace;
  font-size:0.65rem; cursor:pointer; transition:all 0.15s;
}
.coach-toggle-btn:hover { border-color:var(--accent3); color:var(--accent3); }
.level-chip {
  padding:0.2rem 0.65rem; border-radius:99px; font-size:0.6rem; font-weight:600;
  background:rgba(247,201,72,0.12); color:var(--accent); border:1px solid rgba(247,201,72,0.3);
}
.xp-chip {
  padding:0.2rem 0.65rem; border-radius:99px; font-size:0.6rem;
  background:var(--surface2); border:1px solid var(--border); color:var(--muted);
}

/* ── CONTENT AREA ── */
.content-area {
  flex:1; display:flex; overflow:hidden; min-height:0; position:relative;
}

/* ── LESSON PANEL ── */
.lesson-panel {
  flex:1; overflow-y:auto; padding:1.5rem;
  display:flex; flex-direction:column; gap:1.25rem;
  min-height:0;
}
.lesson-panel::-webkit-scrollbar { width:4px; }
.lesson-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }

.completion-banner {
  background:rgba(63,182,139,0.1); border:1px solid rgba(63,182,139,0.3);
  border-radius:10px; padding:1rem 1.25rem;
  display:none; align-items:center; gap:0.75rem;
}
.completion-banner.show { display:flex; }
.cb-title { font-family:'Syne',sans-serif; font-weight:700; font-size:0.85rem; }
.cb-sub { font-size:0.7rem; color:var(--muted); margin-top:2px; }

.lesson-card, .quiz-card, .challenge-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; overflow:visible;
}
.card-header {
  display:flex; align-items:center; gap:0.75rem;
  padding:1rem 1.25rem; border-bottom:1px solid var(--border);
  background:rgba(255,255,255,0.02);
}
.card-icon { font-size:1.3rem; }
.card-title { font-family:'Syne',sans-serif; font-weight:700; font-size:0.9rem; }
.card-subtitle { font-size:0.62rem; color:var(--muted); margin-top:2px; }
.card-body { padding:1.25rem; display:flex; flex-direction:column; gap:1rem; }

.concept-box, .analogy-box, .rw-box {
  padding:0.9rem 1rem; border-radius:8px;
}
.concept-box { background:rgba(88,166,255,0.06); border:1px solid rgba(88,166,255,0.15); }
.analogy-box { background:rgba(247,201,72,0.06); border:1px solid rgba(247,201,72,0.15); }
.rw-box { background:rgba(63,182,139,0.06); border:1px solid rgba(63,182,139,0.15); }
.concept-box h4, .analogy-box h4, .rw-box h4 {
  font-family:'Syne',sans-serif; font-size:0.75rem; font-weight:700; margin-bottom:0.4rem;
}
.concept-box p, .analogy-box p, .rw-box p {
  font-size:0.73rem; line-height:1.7; color:var(--muted);
}

.code-label {
  font-size:0.62rem; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--muted); display:flex; align-items:center; gap:0.4rem;
}
.code-block {
  background:#010409; border:1px solid var(--border);
  border-radius:8px; padding:1rem;
  max-height:none;
  overflow-x:auto;
  overflow-y:visible;
  -webkit-overflow-scrolling:touch;
}
.code-lines { display:flex; flex-direction:column; gap:1px; }
.code-line { font-size:0.75rem; line-height:1.6; white-space:pre; min-height:1.2em; }
.code-block::-webkit-scrollbar { width:6px; height:6px; }
.code-block::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }

/* Code syntax colors */
.ck { color:#ff7b72; }   /* keyword */
.cf { color:#d2a8ff; }   /* function */
.cs { color:#a5d6ff; }   /* string */
.cn { color:#79c0ff; }   /* number */
.cc { color:#8b949e; font-style:italic; }  /* comment */
.co { color:#3fb68b; }   /* output */

.use-cases { display:flex; flex-wrap:wrap; gap:0.4rem; }
.use-case-tag {
  padding:0.2rem 0.6rem; background:rgba(48,105,152,0.2);
  border:1px solid rgba(88,166,255,0.2); border-radius:99px;
  font-size:0.62rem; color:var(--accent3);
}

/* QUIZ */
.quiz-question {
  font-size:0.8rem; line-height:1.6; font-weight:600; margin-bottom:0.75rem;
}
.quiz-opts { display:flex; flex-direction:column; gap:0.5rem; }
.quiz-opt {
  display:flex; align-items:center; gap:0.75rem;
  padding:0.65rem 0.9rem; background:var(--surface2);
  border:1px solid var(--border); border-radius:8px;
  font-family:'JetBrains Mono',monospace; font-size:0.72rem;
  color:var(--text); cursor:pointer; text-align:left;
  transition:all 0.15s;
}
.quiz-opt:hover:not(:disabled) { border-color:var(--accent3); background:rgba(88,166,255,0.06); }
.quiz-opt.correct { border-color:var(--accent2); background:rgba(63,182,139,0.1); color:var(--accent2); }
.quiz-opt.wrong { border-color:var(--danger); background:rgba(248,81,73,0.1); color:var(--danger); }
.quiz-opt-letter {
  width:22px; height:22px; border-radius:5px; background:var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:0.65rem; font-weight:700; flex-shrink:0;
}
.quiz-feedback {
  padding:0.7rem 0.9rem; border-radius:8px; font-size:0.72rem; line-height:1.6;
  margin-top:0.5rem; display:none;
}
.quiz-feedback.correct { background:rgba(63,182,139,0.1); border:1px solid rgba(63,182,139,0.3); color:var(--accent2); display:block; }
.quiz-feedback.wrong   { background:rgba(248,81,73,0.1);  border:1px solid rgba(248,81,73,0.3);  color:var(--danger);  display:block; }

/* CHALLENGE */
.challenge-desc {
  font-size:0.73rem; line-height:1.7; color:var(--muted);
  padding:0.8rem 1rem; background:var(--surface2);
  border-radius:8px; border:1px solid var(--border);
  max-height:none;
  overflow:visible;
  -webkit-overflow-scrolling:touch;
}
.code-editor {
  width:100%; min-height:160px; background:#010409;
  border:1px solid var(--border); border-radius:8px;
  color:var(--text); font-family:'JetBrains Mono',monospace;
  font-size:0.75rem; padding:1rem; resize:vertical;
  outline:none; line-height:1.6; transition:border-color 0.2s;
  max-height:none;
  overflow:auto;
}
.code-editor:focus { border-color:var(--accent3); }

.hints-section { display:flex; gap:0.4rem; flex-wrap:wrap; }
.hint-btn {
  padding:0.3rem 0.7rem; background:var(--surface2);
  border:1px solid var(--border); border-radius:6px;
  font-family:'JetBrains Mono',monospace; font-size:0.65rem;
  color:var(--muted); cursor:pointer; transition:all 0.15s;
}
.hint-btn:hover { border-color:var(--accent); color:var(--accent); }

.hint-display {
  padding:0.7rem 1rem; background:rgba(247,201,72,0.06);
  border:1px solid rgba(247,201,72,0.2); border-radius:8px;
  font-size:0.72rem; line-height:1.6; color:var(--muted);
}

.submit-btn {
  padding:0.7rem 1.5rem; background:var(--accent); color:#000;
  border:none; border-radius:8px; font-family:'Syne',sans-serif;
  font-weight:700; font-size:0.85rem; cursor:pointer; transition:all 0.15s;
  align-self:flex-start;
}
.submit-btn:hover { background:#ffe066; transform:translateY(-1px); }

.code-result {
  padding:0.75rem 1rem; border-radius:8px; font-size:0.72rem; line-height:1.6;
}
.code-result.success { background:rgba(63,182,139,0.1); border:1px solid rgba(63,182,139,0.3); color:var(--accent2); }
.code-result.partial  { background:rgba(247,201,72,0.08); border:1px solid rgba(247,201,72,0.2); color:var(--accent); }

.next-section { display:flex; justify-content:flex-end; padding-bottom:1rem; }
.next-btn {
  padding:0.7rem 1.5rem; background:transparent;
  border:1px solid var(--border); border-radius:8px;
  color:var(--muted); font-family:'JetBrains Mono',monospace;
  font-size:0.75rem; cursor:pointer; transition:all 0.15s;
}
.next-btn:hover { border-color:var(--accent3); color:var(--accent3); }

/* ── CHAT PANEL ── */
.chat-panel {
  width:320px; min-width:320px; border-left:1px solid var(--border);
  display:none; flex-direction:column; background:var(--surface);
  min-height:0;
}
.content-area.chat-open .chat-panel { display:flex; }

.chat-backdrop {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.45); z-index:190;
}
.content-area.chat-open .chat-backdrop { display:block; }

.chat-close-btn {
  margin-left:auto; padding:0.15rem 0.45rem;
  border:1px solid var(--border); border-radius:6px;
  background:var(--surface2); color:var(--muted);
  cursor:pointer; font-size:0.72rem;
}
.chat-close-btn:hover { border-color:var(--accent3); color:var(--accent3); }
.chat-header {
  padding:0.85rem 1rem; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:0.6rem; flex-shrink:0;
}
.coach-avatar {
  width:32px; height:32px; border-radius:50%;
  background:linear-gradient(135deg,var(--py-blue),var(--py-yellow));
  display:flex; align-items:center; justify-content:center; font-size:1rem;
}
.coach-name { font-family:'Syne',sans-serif; font-weight:700; font-size:0.8rem; }
.coach-status { font-size:0.6rem; color:var(--accent2); }

.chat-feed {
  flex:1; overflow-y:auto; padding:0.75rem;
  display:flex; flex-direction:column; gap:0.6rem;
  min-height:0;
}
.chat-feed::-webkit-scrollbar { width:3px; }
.chat-feed::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }

.msg { display:flex; flex-direction:column; max-width:90%; }
.msg.coach { align-self:flex-start; }
.msg.user  { align-self:flex-end; }
.msg-sender { font-size:0.58rem; color:var(--muted); margin-bottom:0.2rem; }
.msg-bubble {
  padding:0.6rem 0.8rem; border-radius:10px;
  font-size:0.72rem; line-height:1.6;
}
.msg.coach .msg-bubble {
  background:var(--surface2); border:1px solid var(--border);
  border-top-left-radius:2px;
}
.msg.user .msg-bubble {
  background:rgba(48,105,152,0.25); border:1px solid rgba(88,166,255,0.2);
  border-top-right-radius:2px; color:#c0d7f0;
}

.quick-prompts {
  padding:0.4rem 0.6rem; border-top:1px solid var(--border);
  display:flex; flex-wrap:wrap; gap:0.3rem; flex-shrink:0;
}
.qp-btn {
  padding:0.2rem 0.5rem; background:var(--surface2);
  border:1px solid var(--border); border-radius:99px;
  font-size:0.6rem; color:var(--muted); cursor:pointer; transition:all 0.12s;
}
.qp-btn:hover { border-color:var(--accent); color:var(--accent); }

.chat-input-row {
  display:flex; gap:0.35rem; padding:0.5rem 0.6rem;
  border-top:1px solid var(--border); flex-shrink:0;
}
.chat-input {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  border-radius:7px; color:var(--text); font-family:'JetBrains Mono',monospace;
  font-size:0.7rem; padding:0.45rem 0.65rem; outline:none; resize:none;
  height:34px; transition:border-color 0.15s;
}
.chat-input:focus { border-color:var(--accent3); }
.send-btn {
  padding:0 0.75rem; background:var(--accent); color:#000;
  border:none; border-radius:7px; cursor:pointer; font-size:0.85rem;
  transition:all 0.12s;
}
.send-btn:hover { background:#ffe066; }

.typing-indicator { display:flex; gap:3px; align-items:center; padding:2px 0; }
.typing-indicator span {
  width:5px; height:5px; background:var(--muted);
  border-radius:50%; animation:bounce 1.2s ease-in-out infinite;
}
.typing-indicator span:nth-child(2) { animation-delay:0.2s; }
.typing-indicator span:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce {
  0%,80%,100% { transform:translateY(0); }
  40% { transform:translateY(-5px); }
}

/* ── TOASTS ── */
#xp-toast {
  position:fixed; bottom:1.5rem; right:1.5rem;
  background:var(--accent); color:#000;
  padding:0.5rem 1rem; border-radius:99px;
  font-family:'Syne',sans-serif; font-weight:700; font-size:0.85rem;
  transform:translateY(60px); opacity:0; transition:all 0.25s;
  z-index:100; pointer-events:none;
}
#xp-toast.show { transform:translateY(0); opacity:1; }

.study-footnote {
  border-top:1px solid var(--border);
  background:var(--surface);
  color:var(--muted);
  font-size:0.58rem;
  letter-spacing:0.08em;
  text-transform:lowercase;
  text-align:center;
  padding:0.45rem 0.8rem calc(0.45rem + env(safe-area-inset-bottom));
  flex-shrink:0;
}

@media (max-width: 980px) {
  .app { height:100dvh; }
  .top-bar { padding:0 0.8rem; }
  .top-bar-left h2 { font-size:0.82rem; }
  .top-bar-left p { font-size:0.56rem; }
  .sidebar-toggle-btn { padding:0.3rem 0.58rem; font-size:0.6rem; }
  .coach-toggle-btn { padding:0.3rem 0.58rem; font-size:0.6rem; }
  .level-chip, .xp-chip { display:none; }
  .lesson-panel {
    padding:1rem 0.85rem calc(1rem + env(safe-area-inset-bottom));
  }

  .content-area.chat-open .chat-panel {
    position:fixed;
    left:0; right:0; bottom:0;
    top:auto;
    width:auto; min-width:0;
    height:min(74dvh, 640px);
    border-left:none;
    border-top:1px solid var(--border);
    border-top-left-radius:14px;
    border-top-right-radius:14px;
    z-index:200;
    box-shadow:0 -8px 30px rgba(0,0,0,0.45);
  }

  .chat-header { padding:0.7rem 0.8rem; }
  .chat-feed { padding:0.6rem; }
  .quick-prompts { padding:0.35rem 0.5rem; }
  .chat-input-row { padding:0.45rem 0.5rem calc(0.45rem + env(safe-area-inset-bottom)); }
}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">
      <a href="/" style="display:flex;align-items:center;gap:0.6rem;text-decoration:none;color:inherit">
        <div class="logo-icon">CC</div>
        <span class="logo-text">Code<span>Coach</span></span>
      </a>
    </div>

    <div class="user-pill">
      <div class="user-avatar" id="user-avatar">G</div>
      <div class="user-info">
        <div class="user-name-text" id="user-name">Guest</div>
        <div class="user-level-text" id="user-level">Python Beginner</div>

gged in → show dashboard, else → login page. E-commerce: if stock > 0 → Add to Cart, else → Out of Stock. Every business rule is a conditional.", "useCases": ["Auth", "Form validation", "Pricing rules", "Feature flags", "Game logic"], "quiz": {"q": "x = 5; what prints? 'big' if x > 10 else 'small'", "opts": [{"t": "big", "ok": false, "fb": "5 is not greater than 10."}, {"t": "small", "ok": true, "fb": "Correct! 5 is NOT > 10, so else branch runs."}, {"t": "Nothing", "ok": false, "fb": "Valid Python syntax — no error."}, {"t": "both", "ok": false, "fb": "Only ONE branch executes — if OR else, never both."}]}, "challenge": "BMI Calculator. Ask for weight (kg) and height (m). Calc BMI = weight / height^2. Print BMI and category: Underweight (<18.5), Normal (18.5-24.9), Overweight (25-29.9), Obese (>=30).", "starter": "# BMI Calculator\n# bmi = weight / (height ** 2)\n", "hints": ["weight = float(input('Weight kg: '))", "bmi = weight / (height ** 2)", "if bmi < 18.5: print('Underweight')", "You need if + 3 elif branches"], "vkeys": ["weight", "height", "bmi", "if/elif", "print"], "vpats": ["input\\(.*weight", "input\\(.*height", "\\*\\*\\s*2", "elif", "print\\("]}, {"title": "Loops (for & while)", "icon": "🔄", "level": "Beginner", "concept": "Loops let you repeat code. for loops iterate over a sequence. while loops run until a condition is false. Loops are Python's engine for automation.", "analogy": "A for loop is like reading a playlist — you go through each song until done. A while loop is like waiting for food — keep checking until it's ready.", "code": ["<span class=\"cc\"># for over range</span>", "<span class=\"ck\">for</span> i <span class=\"ck\">in</span> <span class=\"cf\">range</span>(<span class=\"cn\">5</span>):", "    <span class=\"cf\">print</span>(i)  <span class=\"co\"># 0 1 2 3 4</span>", "", "<span class=\"cc\"># for over a list</span>", "fruits = [<span class=\"cs\">\"apple\"</span>, <span class=\"cs\">\"banana\"</span>, <span class=\"cs\">\"cherry\" "># NYC</span>", "lat, lng = coords  <span class=\"cc\"># unpack</span>"], "realWorld": "Database queries return lists. Shopping carts are lists. Search results are lists. ML training data is lists of vectors. Lists unlock 80% of Python data manipulation.", "useCases": ["DB results", "Shopping carts", "Todo apps", "ML arrays", "API responses"], "quiz": {"q": "nums = [10, 20, 30, 40]. What is nums[-1]?", "opts": [{"t": "10", "ok": false, "fb": "Negative indexing starts from the END. -1 is the last item."}, {"t": "40", "ok": true, "fb": "Correct! -1 is always the last element."}, {"t": "Error", "ok": false, "fb": "Python fully supports negative indexing."}, {"t": "[10,20,30]", "ok": false, "fb": "A single index returns one item, not a slice."}]}, "challenge": "Grade tracker. Given scores = [72, 88, 65, 91, 79], print: highest, lowest, average (1 decimal), and whether the student passed (avg >= 60).", "starter": "scores = [72, 88, 65, 91, 79]\n", "hints": ["max(scores) gives highest", "min(scores) gives lowest", "avg = sum(scores) / len(scores)", "if avg >= 60: print('PASS')"], "vkeys": ["max", "min", "average", "pass/fail", "print"], "vpats": ["max\\(", "min\\(", "sum\\(", "if.*>= 60|if.*average", "print\\("]}, {"title": "Dictionaries & Sets", "icon": "📚", "level": "Intermediate", "concept": "A dictionary stores data as key-value pairs. You look up values by key. This is one of Python's most-used structures — every JSON response maps directly to a Python dictionary.", "analogy": "A dict is like a contact card. You look up the name (key) to get the phone number (value). Keys are unique; values can be anything.", "code": ["<span class=\"cc\"># Create</span>", "user = {", "    <span class=\"cs\">\"name\"</span>: <span class=\"cs\">\"Sofia\"</span>,", "    <span class=\"cs\">\"age\"</span>: <span class=\"cn\">29</span>,", "    <span class=\"cs\">\"active\"</span>: <span class=\"cn\">True</span>", "}", "", "<span class=\"cc\"># Access</span>", "<span class=\"cf\">print</sp : ["words = sentence.split()", "counts = {}", "for word in words: counts[word] = counts.get(word, 0) + 1", "most = max(counts, key=counts.get)"], "vkeys": ["split", "dict", "loop", "counting", "print"], "vpats": ["\\.split\\(", "\\{\\}", "for\\s+\\w+\\s+in", "\\.get\\(", "print\\("]}, {"title": "Functions", "icon": "⚙️", "level": "Intermediate", "concept": "A function is a named, reusable block of code. Write logic once, call it any time. Functions are how you organize real code into manageable, testable, shareable pieces.", "analogy": "A function is like a recipe. Write it once, cook it as many times as you want, with different ingredients for different results.", "code": ["<span class=\"cc\"># Define and call</span>", "<span class=\"ck\">def</span> <span class=\"cf\">greet</span>(name):", "    <span class=\"ck\">return</span> <span class=\"cs\">f\"Hello, {name}!\"</span>", "", "<span class=\"cf\">print</span>(<span class=\"cf\">greet</span>(<span class=\"cs\">\"Amara\"</span>)) <span class=\"co\"># → Hello, Amara!</span>", "", "<span class=\"cc\"># Default parameters</span>", "<span class=\"ck\">def</span> <span class=\"cf\">power</span>(base, exp=<span class=\"cn\">2</span>):", "    <span class=\"ck\">return</span> base ** exp", "", "<span class=\"cf\">print</span>(<span class=\"cf\">power</span>(<span class=\"cn\">3</span>))      <span class=\"co\"># → 9</span>", "<span class=\"cf\">print</span>(<span class=\"cf\">power</span>(<span class=\"cn\">2</span>, <span class=\"cn\">10</span>)) <span class=\"co\"># → 1024</span>", "", "<span class=\"cc\"># Multiple return values</span>", "<span class=\"ck\">def</span> <span class=\"cf\">stats</span>(nums):", "    <span class=\"ck\">return</span> <span class=\"cf\">min</span>(nums), <span class=\"cf\">max</span>(nums)", "low, high = <span class=\"cf\">stats</span>([<span class=\"cn\">3</span>,<span class=\"cn\">1</span>,<span class=\"cn\">9</span>,<span class=\"cn\">2</span>])", "", "<span class=\"cc\"># Lambda (one-liner)</span>", "square = <span class=\"ck\">lambda</span> x: x ** <span class=\"cn\">2</span>", "<span class=\"cf\">print</span>(<span class=\"cf\">square</span>(<span class=\"cn\">7</span>))  <span class=\"co\"># → 49</span>"], "realWorld": "Every meaningful operation in real code is a function: validate_email(), calculate_tax(), send_notification(). Without functions, code becomes unmaintainable.", "useCases": ["Code reuse", "API endpoints", "Data transforms", "Validation", "Utils"], "quiz": {"q": "def add(a, b=5): return a + b ... print(add(3))?", "opts": [{"t": "Error", "ok": false, "fb": "b=5 is a default parameter — totally valid."}, {"t": "8", "ok": true, "fb": "Correct! a=3, b defaults to 5, so 3+5=8."}, {"t": "3", "ok": false, "fb": "The function adds a+b, not just a."}, {"t": "None", "ok": false, "fb": "return is explicit here — it returns a value."}]}, "challenge": "Write is_palindrome(word) that returns True if the word reads the same backwards (like 'racecar'). Test it with 3+ words.", "starter": "def is_palindrome(word):\n    pass\n\nprint(is_palindrome('racecar'))  # True\nprint(is_palindrome('hello'))    # False\n", "hints": ["Reverse a string: word[::-1]", "A palindrome: word == word[::-1]", "Case-insensitive: word.lower() == word.lower()[::-1]", "Return True or False"], "vkeys": ["def", "return", "reverse", "called", "print"], "vpats": ["def\\s+is_palindrome", "return", "\\[::-1\\]", "is_palindrome\\(", "print\\("]}, {"title": "Error Handling", "icon": "🛡️", "level": "Intermediate", "concept": "Every program encounters unexpected situations — bad input, missing files, network failures. Without error handling your program crashes. try/except catches errors gracefully and keeps running.", "analogy": "Error handling is like a seatbelt. You don't plan to crash, but when something unexpected happens, you're protected. Good code anticipates what can go wrong.", "code": ["<span class=\"cc\"># try / except</span>", "<span class=\"ck\">try</span>:", "    age = <span class=\"cf\">int</span>(<span class=\"cf\">input</span>(<span class=\"cs\">\"Age: \"</span>)+)", "<span class=\"ck\">except</span> ValueError:", "    <span class=\"cf\">print</span>(<span class=\"cs\">\"Enter a valid number\"</span>)", "", "<span class=\"cc\"># Multiple exceptions</span>", "<span class=\"ck\">try</span>:", "    result = <span class=\"cn\">10</span> / <span class=\"cf\">int</span>(<span class=\"cf\">input</span>(<span class=\"cs\">\"Divisor: \"</span>))", "<span class=\"ck\">except</span> ValueError:", "    <span class=\"cf\">print</span>(<span class=\"cs\">\"Not a number\"</span>)", "<span class=\"ck\">except</span> ZeroDivisionError:", "    <span class=\"cf\">print</span>(<span class=\"cs\">\"Cannot divide by zero\"</span>)", "<span class=\"ck\">else</span>:", "    <span class=\"cf\">print</span>(<span class=\"cs\">f\"Result: {result}\"</span>) <span class=\"cc\"># no error</span>", "<span class=\"ck\">finally</span>:", "    <span class=\"cf\">print</span>(<span class=\"cs\">\"Done\"</span>)  <span class=\"cc\"># ALWAYS runs</span>", "", "<span class=\"cc\"># Raise your own errors</span>", "<span class=\"ck\">def</span> <span class=\"cf\">set_age</span>(age):", "    <span class=\"ck\">if</span> age < <span class=\"cn\">0</span>: <span class=\"ck\">raise</span> ValueError(<span class=\"cs\">\"Bad age\"</span>)"], "realWorld": "Production apps are full of try/except: API timeouts, disk full, malformed JSON, DB connection lost. Senior devs write error handling first, not as an afterthought.", "useCases": ["API calls", "File ops", "Input validation", "DB queries", "Payments"], "quiz": {"q": "When does `finally` run?", "opts": [{"t": "Only on error", "ok": false, "fb": "That is except's job. finally is unconditional."}, {"t": "Only on success", "ok": false, "fb": "That would be else. finally always runs."}, {"t": "Always", "ok": true, "fb": "Correct! finally is for cleanup — always runs no matter what."}, {"t": "Never", "ok": false, "fb": "finally  class=\"cn\">0</span>):", "        self.owner = owner", "        self.balance = bal", "", "    <span class=\"ck\">def</span> <span class=\"cf\">deposit</span>(self, amount):", "        self.balance += amount", "        <span class=\"cf\">print</span>(<span class=\"cs\">f\"Balance: ${self.balance}\"</span>)", "", "    <span class=\"ck\">def</span> <span class=\"cf\">withdraw</span>(self, amount):", "        <span class=\"ck\">if</span> amount > self.balance:", "            <span class=\"cf\">print</span>(<span class=\"cs\">\"Insufficient funds\"</span>)", "        <span class=\"ck\">else</span>: self.balance -= amount", "", "<span class=\"cc\"># Create objects</span>", "alice = <span class=\"cf\">BankAccount</span>(<span class=\"cs\">\"Alice\"</span>, <span class=\"cn\">1000</span>)", "alice.<span class=\"cf\">deposit</span>(<span class=\"cn\">500</span>)  <span class=\"co\"># Balance: $1500</span>", "", "<span class=\"cc\"># Inheritance</span>", "<span class=\"ck\">class</span> <span class=\"cf\">Savings</span>(<span class=\"cf\">BankAccount</span>):", "    <span class=\"ck\">def</span> <span class=\"cf\">interest</span>(self): self.<span class=\"cf\">deposit</span>(self.balance*<span class=\"cn\">0.05</span>)"], "realWorld": "Django uses OOP for models and views. Games use OOP for characters and levels. Payment SDKs model transactions as objects. Understanding OOP lets you read and contribute to real codebases.", "useCases": ["Django models", "Game objects", "GUI apps", "Simulations", "SDK design"], "quiz": {"q": "What is the purpose of __init__?", "opts": [{"t": "Runs at program start", "ok": false, "fb": "__init__ runs when a new OBJECT is created, not at program start."}, {"t": "Initializes a new object", "ok": true, "fb": "Correct! __init__ is the constructor — sets up attributes when you call MyClass()."}, {"t": "Defines inheritance", "ok": false, "fb": "Inheritance is in the class header: class Child(Parent)."}, {"t": "Never needed", "ok": false, "fb": "Most let currentModule = 0;
let xp = 0, streak = 0, isTyping = false;
let chatHistory = [];
let moduleCompleted = {};
let coachOpen = false;
let sidebarOpen = false;

function openSidebar() {
  sidebarOpen = true;

  const btn = document.getElementById('sidebar-toggle-btn');
  if (app) app.classList.add('sidebar-open');
  if (btn) btn.textContent = '✕ Close';

function closeSidebar() {
  sidebarOpen = false;
  const app = document.querySelector('.app');

}

  coachOpen = true;

  const btn = document.getElementById('coach-toggle-btn');
  if (content) content.classList.add('chat-open');

}

  coachOpen = false;
  const content = document.getElementById('content-area');
  const btn = document.getElementById('coach-toggle-btn');

  else openCoachPanel();

// Load progress (from Supabase if logged in, localStorage always)
async function initProgress() {
  let data = {};
  try {
    if (window.CC) {
      data = await window.CC.loadProgress('python');
    } else {
      data = JSON.parse(localStorage.getItem('cc_progress_python') || '{}');
    }
  } catch(e) {
    data = JSON.parse(localStorage.getItem('cc_progress_python') || '{}');
  }
  xp = data.xp || 0;
  streak = data.streak || 0;
  moduleCompleted = data.completed || {};
}

let currentUser = null;

function getLevelInfo(x) {
  if (x < 50)  return 'Python Beginner';
  if (x < 150) return 'Python Learner';
  if (x < 300) return 'Python Coder';
  if (x < 500) return 'Python Developer';
  return 'Python Pro';
}

function saveProgress() {
  const data = { xp, streak, completed: moduleCompleted };
  localStorage.setItem('cc_progress_python', JSON.stringify(data));
  if (window.CC) window.CC.saveProgress('python', data);
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

        '<div class="card-title">' + m.title + '</div>' +

    '<div class="card-body">' +
      '<div class="concept-box"><h4>🧠 Core Concept</h4><p>' + m.concept + '</p></div>' +
      '<div class="analogy-box"><h4>💡 Think of it this way</h4><p>' + m.analogy + '</p></div>' +
      '<div class="code-label"><span style="color:var(--accent2)">●</span>&nbsp;Code Example</div>' +
      '<div class="code-block"><div class="code-lines">' + codeHtml + '</div></div>' +
      '<div class="rw-box"><h4>🌍 Real-world use</h4><p>' + m.realWorld + '</p></div>' +
      '<div class="code-label">Used in:</div>' +
      '<div class="use-cases">' + m.useCases.map(function(u) {
        return '<span class="use-case-tag">' + u + '</span>';

    '</div>' +
  '</div>';

  // Quiz options
  const quizOpts = m.quiz.opts.map(function(o, i) {

      o.t + '</button>';

  // Quiz card
  html += '<div class="quiz-card">' +
    '<div class="card-header">' +
      '<div class="card-icon">✅</div>' +
      '<div class="card-meta"><div class="card-title">Knowledge Check</div>' +
      '<div class="card-subtitle">Pick the best answer · +15 XP</div></div>' +
    '</div>' +
    '<div class="card-body">' +
      '<div class="quiz-question">' + m.quiz.q + '</div>' +
      '<div class="quiz-opts" id="quiz-opts">' + quizOpts + '</div>' +
      '<div class="quiz-feedback" id="quiz-feedback"></div>' +
    '</div>' +
  '</div>';

  // Hints
  const hintsHtml = m.hints.map(function(h, i) {
    return '<button class="hint-btn" onclick="showHint(' + i + ')">💡 Hint ' + (i+1) + '</button>';
  }).join('');

  // Challenge card
  const nextLabel = idx < MODULES.length - 1 ? 'Continue to next lesson →' : '🎉 Course Complete!';

    '<div class="card-header">' +
      '<div class="card-icon">💻</div>' +
      '<div class="card-meta"><div class="card-title">Coding Challenge</div>' +
      '<div class="card-subtitle">Write real code · +25 XP</div></div>' +

// ===== QUIZ =====
var quizAnswered = false;
function checkAnswer(i) {
  if (quizAnswered) return;
  quizAnswered = true;
  const m = MODULES[currentModule];
  const opt = m.quiz.opts[i];
  const buttons = document.querySelectorAll('#quiz-opts .quiz-opt');
  const fb = document.getElementById('quiz-feedback');

  buttons.forEach(function(btn, j) {
    btn.disabled = true;
    if (m.quiz.opts[j].ok) btn.classList.add('correct');
    else if (j === i && !opt.ok) btn.classList.add('wrong');
  });

  if (opt.ok) {
    fb.className = 'quiz-feedback correct';
    fb.innerHTML = '✅ ' + opt.fb + ' <strong>+15 XP</strong>';
    addXP(15);
  } else {
    fb.className = 'quiz-feedback wrong';
    fb.innerHTML = '❌ ' + opt.fb;
  }
}

// ===== CHALLENGE =====
function showHint(n) {
  const m = MODULES[currentModule];
  if (n >= m.hints.length) return;
  const d = document.getElementById('hint-display');
  d.style.display = 'block';
  d.innerHTML = '💡 <strong>Hint ' + (n+1) + ':</strong> ' + m.hints[n];
}

function checkCode() {
  const code = document.getElementById('code-editor').value;
  const m = MODULES[currentModule];
  const result = document.getElementById('code-result');
  result.style.display = 'block';

  const missing = [];
  for (var i = 0; i < m.vkeys.length; i++) {
    try {
      const rx = new RegExp(m.vpats[i], 'i');
      if (!rx.test(code)) missing.push(m.vkeys[i]);
    } catch(e) { /* skip bad regex */ }
  }

  if (missing.length === 0) {
    result.className = 'code-result success';
    result.innerHTML = '✅ <strong>Excellent work!</strong> Your solution covers all requirements. +25 XP!';
    addXP(25);
    moduleCompleted[currentModule] = true;
    saveProgress();
    const dot = document.getElementById('dot-' + currentModule);
    if (dot) dot.className = 'status-dot dot-done';
    updateProgressBar();
  } else {
    result.className = 'code-result partial';
    result.innerHTML = '⚠️ Almost there! Still working on: <strong>' + missing.join(', ') + '</strong>. Try the hints!';
  }
}

// ===== XP =====
function addXP(amount) {
  xp += amount;
  saveProgress();
  document.getElementById('xp-badge').textContent = '⚡ ' + xp + ' XP';
  document.getElementById('xp-top').textContent = '⚡ ' + xp + ' XP';
  const lv = getLevelInfo(xp);
  document.getElementById('level-badge').textContent = lv;
  document.getElementById('user-level').textContent = lv;
  const t = document.getElementById('xp-toast');
  t.textContent = '+' + amount + ' XP!';
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

// ===== NAV =====
function selectModule(idx) {
  quizAnswered = false;
  renderLesson(idx);
}

function nextModule() {
  if (currentModule < MODULES.length - 1) {
    quizAnswered = false;
    selectModule(currentModule + 1);
  }
}

// ===== PROGRESS BAR =====
function updateProgressBar() {
  const done = Object.keys(moduleCompleted).filter(function(k) { return moduleCompleted[k]; }).length;
  const pct = Math.min(100, Math.round((done / MODULES.length) * 100));
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('pct-label').textContent = pct + '%';
}

// ===== SIDEBAR =====
function buildSidebar() {
  const list = document.getElementById('module-list');
  list.innerHTML = '';
  const sections = [
    { label:'BEGINNER',     color:'var(--accent2)', from:0,  to:5  },
    { label:'INTERMEDIATE', color:'var(--accent3)', from:5,  to:10 },
    { label:'ADVANCED',     color:'#c084fc',        from:10, to:15 },
  ];
  sections.forEach(function(sec) {
    const h = document.createElement('div');
    h.className = 'section-header';
    h.innerHTML = '<span class="section-dot" style="background:' + sec.color + '"></span>' + sec.label;
    list.appendChild(h);
    for (var i = sec.from; i < sec.to; i++) {
      (function(idx) {
        const item = document.createElement('div');
        item.className = 'module-item' + (idx === 0 ? ' active' : '');
        item.onclick = function() {
          selectModule(idx);
          if (window.innerWidth <= 1200) closeSidebar();
        };
        const dotCls = moduleCompleted[idx] ? 'dot-done' : (idx === 0 ? 'dot-active' : 'dot-empty');
        item.innerHTML =
          '<span class="module-num-text">' + String(idx+1).padStart(2,'0') + '</span>' +
          '<span class="module-name-text">' + MODULES[idx].title + '</span>' +
          '<span class="status-dot ' + dotCls + '" id="dot-' + idx + '"></span>';
        list.appendChild(item);
      })(i);
    }
  });
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isTyping) return;
  input.value = '';
  appendMsg('user', text);
  chatHistory.push({ role:'user', content:text });
  callCoach(text);
}

function quickPrompt(t) {
  document.getElementById('chat-input').value = t;
  sendMessage();
}

  const feed = document.getElementById('chat-feed');
  const div = document.createElement('div');
  div.className = 'msg ' + role;

    '<div class="msg-bubble">' + text.replace(/\n/g,'<br>') + '</div>';
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}

  feed.appendChild(typing);
  feed.scrollTop = feed.scrollHeight;

  const sys = 'You are Coach Py, a friendly Python tutor. Current module: "' + m.title + '" (' + m.level + '). ' +
    'Topic: ' + m.concept + ' Guide with questions and hints — never give direct answers. Keep responses to 2-3 sentences.';

  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'x-api-key': window.ANTHROPIC_API_KEY || '' },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:300, system:sys, messages:chatHistory })
    });
    const data = await r.json();
    document.getElementById('typing-ind')?.remove();
    const reply = data.content && data.content[0] ? data.content[0].text
      : '⚠️ API error: ' + (data.error?.message || 'Check your API key.');
    chatHistory.push({ role:'assistant', content:reply });
    appendMsg('coach', reply);
  } catch(e) {
    document.getElementById('typing-ind')?.remove();
    appendMsg('coach', "Can't connect right now. Add your Anthropic API key at console.anthropic.com to enable me! 🔑");
  }
  isTyping = false;
}

// ===== INIT =====

function updateUserUI() {
  if (!currentUser) return;
  const name = window.CC ? window.CC.getDisplayName(currentUser) : (currentUser.name || 'Learner');
  const el = document.getElementById('user-name');
  const av = document.getElementById('user-avatar');
  if (el) el.textContent = name;
  if (av) av.textContent = name[0].toUpperCase();
}
async function init() {
  // Load progress + auth state
  await initProgress();
  if (window.CC) {
    currentUser = await window.CC.getUser();
    window.CC.onAuthChange(u => { currentUser = u; updateUserUI(); });
  } else {
    try { currentUser = JSON.parse(localStorage.getItem('cc_user') || 'null'); } catch(e) {}
  }
  buildSidebar();
  updateProgressBar();

  const lv = getLevelInfo(xp);
  document.getElementById('xp-badge').textContent = '⚡ ' + xp + ' XP';
  document.getElementById('xp-top').textContent = '⚡ ' + xp + ' XP';
  document.getElementById('streak-badge').textContent = '🔥 ' + streak;
  document.getElementById('level-badge').textContent = lv;
  document.getElementById('user-level').textContent = lv;

  if (currentUser) {
    document.getElementById('user-name').textContent = currentUser.name || 'Learner';
    document.getElementById('user-avatar').textContent = (currentUser.name || 'L')[0].toUpperCase();
  }

  const feed = document.getElementById('chat-feed');
  feed.innerHTML = '<div class="msg coach"><div class="msg-sender">🐍 Coach Py</div>' +
    '<div class="msg-bubble">Hey! I\'m Coach Py, your Python learning companion 🐍 I\'ll guide you with hints and questions — not give away answers — so you truly understand. What would you like to explore about <strong>' + MODULES[0].title + '</strong>?</div></div>';

  document.getElementById('chat-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeSidebar();
      if (coachOpen) closeCoachPanel();
    }
  });

  renderLesson(0);
}

init();
</script>
